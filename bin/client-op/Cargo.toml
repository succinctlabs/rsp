[workspace.package]
[package]
name = "rsp-client-op"
description = ""
edition = "2021"

[dependencies]
bincode = "1.3.3"

# workspace
rsp-client-executor = { path = "../../crates/executor/client", features = ["optimism"]}

# sp1
sp1-zkvm = "=6.2.3"

# Statically turns off logging
log = { version = "0.4", features = ["max_level_off", "release_max_level_off"] }
tracing = { version = "0.1", features = ["max_level_off", "release_max_level_off"] }

[patch.crates-io]
# Precompile patches
sha2 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha2-0.10.9-sp1-6.0.0", package = "sha2" }
bn = { git = "https://github.com/sp1-patches/bn", tag = "patch-0.6.0-sp1-6.0.0", package = "substrate-bn-succinct-rs" }
sha3 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", tag = "patch-sha3-0.10.8-sp1-6.0.0" }
k256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-k256-13.4-sp1-6.0.0" }
p256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-p256-13.2-sp1-6.0.0" }

# Temporary fork redirect (validating ethereum-optimism/optimism PRs) combining:
#  - op-alloy-network reqwest opt-in  → drops reqwest/mio/socket2 from the zkVM ELF
#  - op-reth chainspec reth-codec opt-in → drops reth-zstd-compressors/zstd/zstd-sys (native C)
# Both fixes live on the fakedev9999/optimism rsp-reth-v2-validation branch.
op-alloy-network = { git = "https://github.com/fakedev9999/optimism", branch = "fakedev9999/rsp-reth-v2-validation" }

[patch."https://github.com/ethereum-optimism/optimism"]
reth-optimism-chainspec = { git = "https://github.com/fakedev9999/optimism", branch = "fakedev9999/rsp-reth-v2-validation" }
reth-optimism-primitives = { git = "https://github.com/fakedev9999/optimism", branch = "fakedev9999/rsp-reth-v2-validation" }
reth-optimism-evm = { git = "https://github.com/fakedev9999/optimism", branch = "fakedev9999/rsp-reth-v2-validation" }
reth-optimism-consensus = { git = "https://github.com/fakedev9999/optimism", branch = "fakedev9999/rsp-reth-v2-validation" }
reth-optimism-forks = { git = "https://github.com/fakedev9999/optimism", branch = "fakedev9999/rsp-reth-v2-validation" }
