[package]
version = "0.1.0"
name = "continuous"
edition = "2021"

[dependencies]
serde.workspace = true
tokio.workspace = true
url.workspace = true
tracing.workspace = true
clap = { version = "4.5.7", features = ["derive", "env"] }
dotenv = "0.15.0"
eyre = "0.6.12"
futures-util = "0.3.31"
sqlx = { version = "0.7", features = ["runtime-tokio-native-tls", "postgres", "chrono"] }
tracing-subscriber = "0.3.18"

# workspace
rsp-host-executor = { workspace = true, features = ["alerting"] }
rsp-client-executor.workspace = true
rsp-provider.workspace = true

# sp1
sp1-sdk.workspace = true

# alloy
alloy-consensus.workspace = true
alloy-provider = { workspace = true, features = ["ws"] }
alloy-rpc-client.workspace = true
alloy-transport.workspace = true
alloy-transport-ws.workspace = true

# reth
reth-evm.workspace = true
reth-primitives-traits.workspace = true

[features]
# Select the arena-based (unaudited) MPT backend for both the host witness emission and the
# `rsp-client` guest ELF (build.rs forwards this to the guest). Default is the legacy MPT.
arena = ["rsp-host-executor/arena", "rsp-client-executor/arena"]

[build-dependencies]
sp1-build.workspace = true