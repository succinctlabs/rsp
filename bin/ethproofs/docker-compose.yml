services:
  rsp:
    build:
      context: ../..
      target: rsp-ethproofs
    env_file: .env
    # Proving runs in-process on the GPU (managed by the SP1 SDK), so the service needs GPU access.
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped
