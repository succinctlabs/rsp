[package]
version = "0.1.0"
name = "ethproofs"
edition = "2021"

[dependencies]
tokio.workspace = true
tokio-stream = "0.1"
url.workspace = true
tracing.workspace = true
serde.workspace = true
serde_json.workspace = true
bincode = "1.3.3"
tracing-subscriber = "0.3.18"
dotenv = "0.15.0"
clap = { version = "4.5.7", features = ["derive", "env"] }
eyre = "0.6.12"
reqwest = { workspace = true, features = ["json"] }
reqwest-middleware = { version = "0.3.3", features = ["json"] }
reqwest-retry = "0.6.1"
base64 = "0.22.1"
futures = "0.3"
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", features = ["http-listener"] }

# workspace
rsp-host-executor = { workspace = true, features = ["alerting"] }
rsp-client-executor.workspace = true
rsp-provider.workspace = true

# sp1
sp1-sdk.workspace = true

# reth
reth-primitives-traits.workspace = true

# alloy
alloy-consensus.workspace = true
alloy-provider = { workspace = true, features = ["ws"] }

[dev-dependencies]
metrics-util = { version = "0.19", features = ["debugging"] }
tokio = { workspace = true, features = ["test-util"] }

[build-dependencies]
sp1-build.workspace = true

[features]
default = ["cuda"]
cuda = ["sp1-sdk/cuda", "rsp-host-executor/cuda"]
