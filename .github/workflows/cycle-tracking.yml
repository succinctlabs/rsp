name: "Cycle tracking"

on:
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  cycle-tracking:
    name: "Run client in SP1 and verify if cycle count hasn't increased"
    runs-on:
      ["runs-on", "runner=64cpu-linux-x64", "run-id=${{ github.run_id }}"]
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: "Checkout sources"
        uses: "actions/checkout@v4"
        with:
          fetch-depth: 0

      - name: "Configure git for private repos"
        run: |
          git config --global url."https://x-access-token:${{ secrets.SP1_PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: "Install protoc"
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: "Install nightly toolchain"
        run: |
          rustup toolchain install nightly
          rustup default nightly

      - name: "Install SP1 v6 toolchain"
        run: |
          # Clone sp1-wip and build sp1-cli without CUDA (--no-default-features)
          mkdir -p ~/.sp1
          git clone --depth 1 --branch multilinear_v6 https://x-access-token:${{ secrets.SP1_PRIVATE_REPO_TOKEN }}@github.com/succinctlabs/sp1-wip.git ~/.sp1/sp1-wip
          cd ~/.sp1/sp1-wip
          # Build and install toolchain using the same approach as sp1-wip's CI
          cargo run -p sp1-cli --release --no-default-features -- prove install-toolchain
          mkdir -p ~/.sp1/bin
          cp target/release/cargo-prove ~/.sp1/bin/
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH
        env:
          RUSTUP_TOOLCHAIN: nightly

      - name: "Set up test fixture"
        run: |
          git clone https://github.com/succinctlabs/rsp-tests --branch 2025-09-30 --depth 1 ../rsp-tests
          cd ../rsp-tests/
          docker compose up -d

      - name: "Use local test fixture"
        run: |
          echo "RPC_1=http://localhost:9545/main/evm/1" >> $GITHUB_ENV
          echo "RPC_10=http://localhost:9545/main/evm/10" >> $GITHUB_ENV
          echo "RPC_17000=http://localhost:9545/main/evm/17000" >> $GITHUB_ENV
          echo "RPC_59144=http://localhost:9545/main/evm/59144" >> $GITHUB_ENV
          echo "RPC_11155111=http://localhost:9545/main/evm/11155111" >> $GITHUB_ENV

      - name: "Run tests"
        run: |
          export RUST_LOG=info
          cargo test --release test_in_zkvm -- --exact --nocapture

      - name: "Checkout base branch"
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git checkout origin/${{ github.event.pull_request.base.ref }} -- . ':(exclude)cycle_stats.json'

      - name: "Run tests on base branch"
        id: tests-report
        run: |
          export RUST_LOG=info
          BASE_BRANCH=1 cargo test  --release test_in_zkvm -- --exact --nocapture

      - name: "Add execution report"
        uses: actions/github-script@v7
        env:
          EXECUTION_REPORT: ${{ steps.tests-report.outputs.EXECUTION_REPORT }}
        with:
          script: |
            const { EXECUTION_REPORT } = process.env
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${EXECUTION_REPORT}`
            })