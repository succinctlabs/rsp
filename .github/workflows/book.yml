name: book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "book/**"
  merge_group:

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: cd book && yarn install --frozen-lockfile
      - name: Build website
        run: cd book && yarn build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Only deploy on pushes to main (i.e. after merge). On pull requests the build job above
    # still validates the docs, but deploying to the `github-pages` environment is restricted to
    # the default branch and would otherwise fail and show a misleading red check.
    if: github.event_name == 'push'

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4